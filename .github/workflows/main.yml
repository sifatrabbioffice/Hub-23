name: GameHub Ultimate Engine Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Ultra IPA
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Core Infrastructure
        run: |
          mkdir -p GameHub
          
          # 1. Info.plist (Error-Free Dictionary)
          cat << 'EOF' > GameHub/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>GameHub</string>
            <key>CFBundleIdentifier</key>
            <string>com.gamehub.emulator.ultimate</string>
            <key>CFBundleName</key>
            <string>GameHub</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>3.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>UIFileSharingEnabled</key>
            <true/>
            <key>LSSupportsOpeningDocumentsInPlace</key>
            <true/>
            <key>UILaunchStoryboardName</key>
            <string>LaunchScreen</string>
            <key>UISupportedInterfaceOrientations</key>
            <array>
              <string>UIInterfaceOrientationLandscapeLeft</string>
              <string>UIInterfaceOrientationLandscapeRight</string>
            </array>
            <key>UIViewControllerBasedStatusBarAppearance</key>
            <false/>
            <key>UIRequiresFullScreen</key>
            <true/>
          </dict>
          </plist>
          EOF

          plutil -lint GameHub/Info.plist || exit 1

          # 2. Project Configuration (Optimized for Apple Silicon & Metal)
          cat << 'EOF' > project.yml
          name: GameHub
          options:
            bundleIdPrefix: com.gamehub.emulator
          targets:
            GameHub:
              type: application
              platform: iOS
              deploymentTarget: "17.0"
              sources: [GameHub]
              settings:
                base:
                  INFOPLIST_FILE: GameHub/Info.plist
                  GENERATE_INFOPLIST_FILE: NO
                  PRODUCT_BUNDLE_IDENTIFIER: com.gamehub.emulator.ultimate
                  MARKETING_VERSION: 3.0
                  TARGETED_DEVICE_FAMILY: 1
                  ENABLE_BITCODE: NO
                  ONLY_ACTIVE_ARCH: NO
                  SWIFT_OPTIMIZATION_LEVEL: "-O"
          EOF

          # 3. Master Swift File (UI, Settings, File Manager & Virtual Gamepad)
          cat << 'EOF' > GameHub/App.swift
          import SwiftUI
          import UniformTypeIdentifiers

          @main
          struct GameHubApp: App {
              var body: some Scene {
                  WindowGroup {
                      MainDirector()
                  }
              }
          }

          struct MainDirector: View {
              @State private var currentMode: AppMode = .dashboard
              @State private var selectedGamePath: String = ""
              
              enum AppMode { case dashboard, playing }
              
              var body: some View {
                  ZStack {
                      Color.black.ignoresSafeArea()
                      if currentMode == .dashboard {
                          DashboardCore(onLaunch: { path in
                              selectedGamePath = path
                              currentMode = .playing
                          })
                      } else {
                          GameEnvironment(gamePath: selectedGamePath, onExit: {
                              currentMode = .dashboard
                          })
                      }
                  }
              }
          }

          // MARK: - Dashboard & Settings
          struct DashboardCore: View {
              var onLaunch: (String) -> Void
              @State private var showFilePicker = false
              
              // Core Settings
              @AppStorage("cpuCores") private var cpuCores = 6
              @AppStorage("ramAlloc") private var ramAlloc = 4096
              @AppStorage("dxvkEnabled") private var dxvkEnabled = true
              @AppStorage("fpsLock") private var fpsLock = 60
              
              var body: some View {
                  HStack(spacing: 0) {
                      // Left Panel: System & Processors
                      VStack(alignment: .leading, spacing: 20) {
                          Text("SYSTEM CONFIG").font(.title3).bold().foregroundColor(.blue)
                          
                          VStack(alignment: .leading, spacing: 10) {
                              Text("CPU Cores: \(cpuCores)")
                              Slider(value: Binding(get: { Double(cpuCores) }, set: { cpuCores = Int($0) }), in: 2...8, step: 1)
                              
                              Text("RAM Allocation: \(ramAlloc) MB")
                              Slider(value: Binding(get: { Double(ramAlloc) }, set: { ramAlloc = Int($0) }), in: 1024...6144, step: 512)
                              
                              Toggle("MoltenVK (DX11 to Metal)", isOn: $dxvkEnabled)
                              
                              Picker("FPS Target", selection: $fpsLock) {
                                  Text("30 FPS").tag(30)
                                  Text("60 FPS").tag(60)
                                  Text("Uncapped").tag(120)
                              }.pickerStyle(.segmented)
                          }.font(.subheadline).foregroundColor(.white)
                          
                          Spacer()
                          
                          Button(action: { showFilePicker = true }) {
                              HStack {
                                  Image(systemName: "folder.fill")
                                  Text("IMPORT .EXE")
                              }
                              .frame(maxWidth: .infinity)
                              .padding().background(Color.blue).foregroundColor(.white).cornerRadius(10)
                          }
                      }
                      .padding().frame(width: 320).background(Color(white: 0.1))
                      
                      // Right Panel: Library
                      VStack {
                          Text("LOCAL LIBRARY").font(.title2).bold().foregroundColor(.gray).padding()
                          Spacer()
                          Image(systemName: "gamecontroller.fill").font(.system(size: 60)).foregroundColor(.gray).opacity(0.5)
                          Text("Waiting for local file mapping...").foregroundColor(.gray).padding()
                          Spacer()
                      }
                      .frame(maxWidth: .infinity)
                  }
                  .sheet(isPresented: $showFilePicker) {
                      DocumentPicker { url in
                          onLaunch(url.lastPathComponent)
                      }
                  }
              }
          }

          // MARK: - Game Execution & Virtual Pad
          struct GameEnvironment: View {
              var gamePath: String
              var onExit: () -> Void
              
              var body: some View {
                  ZStack {
                      // Simulated Game Render Layer
                      Rectangle().fill(LinearGradient(colors: [.black, Color(white: 0.1)], startPoint: .top, endPoint: .bottom))
                          .ignoresSafeArea()
                      
                      VStack {
                          HStack {
                              Text("Executing: \(gamePath)").font(.caption).foregroundColor(.green)
                              Spacer()
                              Button("EXIT ENGINE", action: onExit).font(.caption).foregroundColor(.red)
                          }.padding(.horizontal)
                          Spacer()
                      }
                      
                      // The Ultimate Virtual Controller
                      VirtualGamepadOverlay()
                  }
              }
          }

          struct VirtualGamepadOverlay: View {
              var body: some View {
                  HStack {
                      // Left Side: L1/L2 & Left Analog
                      VStack {
                          HStack(spacing: 20) {
                              ControlButton(title: "L2", width: 60, height: 40)
                              ControlButton(title: "L1", width: 60, height: 40)
                          }
                          Spacer()
                          AnalogStick()
                      }.padding()
                      
                      Spacer()
                      
                      // Right Side: R1/R2, Action Buttons & Right Analog
                      VStack {
                          HStack(spacing: 20) {
                              ControlButton(title: "R1", width: 60, height: 40)
                              ControlButton(title: "R2", width: 60, height: 40)
                          }
                          Spacer()
                          HStack(alignment: .bottom, spacing: 40) {
                              AnalogStick() // Camera
                              
                              // ABXY Cluster
                              VStack(spacing: 10) {
                                  ControlButton(title: "Y", width: 50, height: 50, isRound: true)
                                  HStack(spacing: 10) {
                                      ControlButton(title: "X", width: 50, height: 50, isRound: true)
                                      Spacer().frame(width: 30)
                                      ControlButton(title: "B", width: 50, height: 50, isRound: true)
                                  }
                                  ControlButton(title: "A", width: 50, height: 50, isRound: true)
                              }
                          }
                      }.padding()
                  }
              }
          }

          // MARK: - UI Components
          struct ControlButton: View {
              var title: String
              var width: CGFloat
              var height: CGFloat
              var isRound: Bool = false
              
              var body: some View {
                  ZStack {
                      if isRound {
                          Circle().fill(Color.white.opacity(0.2)).frame(width: width, height: height)
                      } else {
                          RoundedRectangle(cornerRadius: 10).fill(Color.white.opacity(0.2)).frame(width: width, height: height)
                      }
                      Text(title).bold().foregroundColor(.white.opacity(0.8))
                  }
              }
          }

          struct AnalogStick: View {
              @State private var offset = CGSize.zero
              var body: some View {
                  ZStack {
                      Circle().fill(Color.gray.opacity(0.3)).frame(width: 120, height: 120)
                      Circle().fill(Color.white.opacity(0.5)).frame(width: 60, height: 60)
                          .offset(offset)
                          .gesture(
                              DragGesture()
                                  .onChanged { value in
                                      let radius: CGFloat = 30
                                      let hypotenuse = sqrt(value.translation.width * value.translation.width + value.translation.height * value.translation.height)
                                      if hypotenuse <= radius {
                                          offset = value.translation
                                      } else {
                                          offset = CGSize(width: value.translation.width / hypotenuse * radius,
                                                          height: value.translation.height / hypotenuse * radius)
                                      }
                                  }
                                  .onEnded { _ in
                                      withAnimation(.spring()) { offset = .zero }
                                  }
                          )
                  }
              }
          }

          // MARK: - File Management
          struct DocumentPicker: UIViewControllerRepresentable {
              var onPick: (URL) -> Void
              
              func makeUIViewController(context: Context) -> UIDocumentPickerViewController {
                  let picker = UIDocumentPickerViewController(forOpeningContentTypes: [.data], asCopy: true)
                  picker.delegate = context.coordinator
                  return picker
              }
              
              func updateUIViewController(_ uiViewController: UIDocumentPickerViewController, context: Context) {}
              
              func makeCoordinator() -> Coordinator { Coordinator(self) }
              
              class Coordinator: NSObject, UIDocumentPickerDelegate {
                  var parent: DocumentPicker
                  init(_ parent: DocumentPicker) { self.parent = parent }
                  
                  func documentPicker(_ controller: UIDocumentPickerViewController, didPickDocumentsAt urls: [URL]) {
                      guard let url = urls.first else { return }
                      parent.onPick(url)
                  }
              }
          }
          EOF

          # 4. Dummy LaunchScreen
          cat << 'EOF' > GameHub/LaunchScreen.swift
          import UIKit
          class LaunchScreen: UIViewController {}
          EOF

      - name: Build Archive
        run: |
          xcodegen generate
          xcodebuild archive \
            -project GameHub.xcodeproj \
            -scheme GameHub \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/GameHub.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package Ultimate IPA
        run: |
          mkdir -p build/Payload
          cp -r build/GameHub.xcarchive/Products/Applications/*.app build/Payload/
          cd build && zip -qr GameHub_Ultimate_V3.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameHub-Ultimate-IPA
          path: build/GameHub_Ultimate_V3.ipa
